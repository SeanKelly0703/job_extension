<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resume Tailor</title>
    <style>
      body {
        margin: 0;
        width: 390px;
        background: #f4f6fb;
        color: #121826;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      .app { padding: 14px; }
      .card {
        background: #fff;
        border: 1px solid #d8dce6;
        border-radius: 12px;
        padding: 12px;
      }
      h3 { margin: 0 0 10px; font-size: 15px; }
      label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 6px; }
      textarea {
        width: 100%;
        min-height: 190px;
        resize: vertical;
        border: 1px solid #d8dce6;
        border-radius: 8px;
        padding: 8px 10px;
        font: inherit;
        box-sizing: border-box;
      }
      .actions { display: flex; gap: 8px; margin-top: 10px; }
      .btn {
        border: 1px solid #d8dce6;
        background: #fff;
        color: #121826;
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
        font-size: 12px;
      }
      .btn.primary {
        background: #2563eb;
        color: #fff;
        border-color: #2563eb;
      }
      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
      }
      .pill {
        font-size: 11px;
        border: 1px solid #d8dce6;
        border-radius: 999px;
        padding: 3px 8px;
        color: #6b7280;
      }
      .status {
        margin-top: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        font-size: 12px;
        white-space: pre-wrap;
        border: 1px solid #d8dce6;
        color: #6b7280;
      }
      .status.success { background: #eafaf1; color: #0b6b35; border-color: transparent; }
      .status.error { background: #fdecec; color: #b42318; border-color: transparent; }
      #tailorPreview { display: none; }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="card">
        <h3>Resume Tailor</h3>
        <label for="description">Job Description</label>
        <textarea id="description" placeholder="Paste job description here..."></textarea>
        <div class="actions">
          <button id="sendBtn" class="btn">Send to Server</button>
          <button id="tailorExportBtn" class="btn primary">Tailor + Export PDF</button>
        </div>
        <div class="footer">
          <span id="charCount" class="pill">0 chars</span>
          <span style="font-size:11px;color:#6b7280;">One-click export</span>
        </div>
        <div id="status" class="status">Ready.</div>
      </div>
    </div>
    <div id="tailorPreview"><iframe id="tailorPreviewFrame" title="Tailored resume preview"></iframe></div>
    <script src="./popup.js"></script>
  </body>
</html>
