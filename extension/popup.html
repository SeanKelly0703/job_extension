<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Post Detector</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="card">
      <header class="header">
        <div class="badge">Phase 1</div>
        <h1>Job Post Detector</h1>
        <p>Detect whether the current page is a job post and pull a JD preview.</p>
      </header>

      <section class="actions">
        <button id="detectBtn" class="detect-btn">Detect & Scrape</button>
      </section>

      <section id="result" class="result hidden" aria-live="polite">
        <div class="result-top">
          <h2 id="classification">—</h2>
          <span id="confidencePill" class="pill">0%</span>
        </div>
        <p id="reasonSummary" class="summary"></p>

        <details open>
          <summary>Detection signals</summary>
          <ul id="signals"></ul>
        </details>

        <section id="jdSection" class="jd-section hidden">
          <div class="jd-head">
            <h3>Job Description Preview</h3>
            <button id="copyBtn" class="copy-btn" type="button">Copy</button>
          </div>
          <p id="jdPreview" class="jd-preview"></p>
        </section>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
